<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 960pt; height: 540pt; margin: 0; padding: 0;
  background: #ffffff; font-family: 'Times New Roman', Georgia, serif;
  display: flex; flex-direction: column;
}
.figure-area {
  margin: 28pt 36pt 10pt 36pt;
  flex: 1;
  display: flex; flex-direction: column;
}
.header-row {
  display: flex; gap: 0; margin-bottom: 14pt;
}
.header-os {
  flex: 3;
  border: 1.5pt solid #333333;
  background: #333333;
  padding: 6pt;
}
.header-arrow {
  flex: 2;
  display: flex; align-items: center; justify-content: center;
}
.header-llm {
  flex: 3;
  border: 1.5pt solid #333333;
  background: #666666;
  padding: 6pt;
}
.mapping-row {
  display: flex; gap: 0; margin-bottom: 8pt;
}
.os-box {
  flex: 3;
  border: 1pt solid #333333;
  padding: 8pt 12pt;
  display: flex; align-items: center; justify-content: center;
}
.arrow-box {
  flex: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.llm-box {
  flex: 3;
  border: 1pt solid #666666;
  padding: 8pt 12pt;
  background: #f9f9f9;
  display: flex; align-items: center; justify-content: center;
}
.bottom-note {
  margin-top: auto;
  border-top: 1pt solid #333333;
  padding-top: 6pt;
}
</style>
</head>
<body>
<div class="figure-area">
  <!-- Header -->
  <div class="header-row">
    <div class="header-os">
      <p style="font-size:13pt; font-weight:bold; color:#ffffff; margin:0; text-align:center;">OS 스케줄링 개념</p>
    </div>
    <div class="header-arrow">
      <p style="font-size:16pt; color:#333333; margin:0;">───────▶</p>
    </div>
    <div class="header-llm">
      <p style="font-size:13pt; font-weight:bold; color:#ffffff; margin:0; text-align:center;">LLM API 도메인</p>
    </div>
  </div>
  <!-- Row 1 -->
  <div class="mapping-row">
    <div class="os-box">
      <p style="font-size:12pt; font-weight:bold; color:#333333; margin:0;">프로세스 (Process)</p>
    </div>
    <div class="arrow-box">
      <p style="font-size:12pt; color:#333333; margin:0;">──▶</p>
      <p style="font-size:8pt; color:#999999; margin:2pt 0 0 0; font-style:italic;">스케줄링 단위</p>
    </div>
    <div class="llm-box">
      <p style="font-size:12pt; font-weight:bold; color:#555555; margin:0;">LLM API 요청</p>
    </div>
  </div>
  <!-- Row 2 -->
  <div class="mapping-row">
    <div class="os-box">
      <p style="font-size:12pt; font-weight:bold; color:#333333; margin:0;">CPU 시간</p>
    </div>
    <div class="arrow-box">
      <p style="font-size:12pt; color:#333333; margin:0;">──▶</p>
      <p style="font-size:8pt; color:#999999; margin:2pt 0 0 0; font-style:italic;">할당 자원</p>
    </div>
    <div class="llm-box">
      <p style="font-size:12pt; font-weight:bold; color:#555555; margin:0;">API 호출 쿼터</p>
    </div>
  </div>
  <!-- Row 3 -->
  <div class="mapping-row">
    <div class="os-box">
      <p style="font-size:12pt; font-weight:bold; color:#333333; margin:0;">우선순위 (Priority)</p>
    </div>
    <div class="arrow-box">
      <p style="font-size:12pt; color:#333333; margin:0;">──▶</p>
      <p style="font-size:8pt; color:#999999; margin:2pt 0 0 0; font-style:italic;">처리 순서 기준</p>
    </div>
    <div class="llm-box">
      <p style="font-size:12pt; font-weight:bold; color:#555555; margin:0;">테넌트 등급 · 요청 긴급도</p>
    </div>
  </div>
  <!-- Row 4 -->
  <div class="mapping-row">
    <div class="os-box">
      <p style="font-size:12pt; font-weight:bold; color:#333333; margin:0;">스케줄링 알고리즘</p>
    </div>
    <div class="arrow-box">
      <p style="font-size:12pt; color:#333333; margin:0;">──▶</p>
      <p style="font-size:8pt; color:#999999; margin:2pt 0 0 0; font-style:italic;">자원 배분 정책</p>
    </div>
    <div class="llm-box">
      <p style="font-size:12pt; font-weight:bold; color:#555555; margin:0;">요청 처리 순서 결정</p>
    </div>
  </div>
  <!-- Row 5 -->
  <div class="mapping-row">
    <div class="os-box">
      <p style="font-size:12pt; font-weight:bold; color:#333333; margin:0;">선점 (Preemption)</p>
    </div>
    <div class="arrow-box">
      <p style="font-size:12pt; color:#333333; margin:0;">──▶</p>
      <p style="font-size:8pt; color:#999999; margin:2pt 0 0 0; font-style:italic;">긴 요청 제어</p>
    </div>
    <div class="llm-box">
      <p style="font-size:12pt; font-weight:bold; color:#555555; margin:0;">요청 중단 · 큐 이동</p>
    </div>
  </div>
  <!-- Bottom -->
  <div class="bottom-note">
    <p style="font-size:9pt; font-weight:bold; color:#333333; margin:0; text-align:center;">핵심 아이디어: OS의 검증된 스케줄링 이론을 LLM API 요청 관리에 적용</p>
  </div>
</div>
</body>
</html>
